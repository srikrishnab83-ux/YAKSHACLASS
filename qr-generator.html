<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free QR Code Generator | VidToolkit Pro</title>

<meta name="description" content="Generate free QR codes for URLs, text, email, phone numbers, WhatsApp and WiFi. Download QR codes instantly.">

<link rel="stylesheet" href="../css/qr-generator.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="../js/qrcode.min.js"></script>

</head>

<body>

<!-- ====== COPY YOUR EXISTING HEADER HERE ====== -->

<section class="tool-hero">

<div class="container">

<h1>QR Code Generator</h1>

<p>Create QR codes instantly for URLs, text, email, phone, WhatsApp and WiFi.</p>

</div>

</section>

<section class="tool-section">

<div class="container">

<div class="tool-card">

<div class="form-group">

<label>QR Type</label>

<select id="qrType">

<option value="url">Website URL</option>

<option value="text">Text</option>

<option value="email">Email</option>

<option value="phone">Phone</option>

<option value="whatsapp">WhatsApp</option>

<option value="wifi">WiFi</option>

</select>

</div>

<div class="form-group">

<label>Enter Value</label>

<textarea
id="qrInput"
placeholder="Enter your content here..."
rows="5"></textarea>

</div>

<div class="button-group">

<button id="generateBtn">

Generate QR

</button>

<button id="downloadBtn">

Download PNG

</button>

<button id="copyBtn">

Copy

</button>

<button id="clearBtn">

Clear

</button>

</div>

</div>

<div class="preview-card">

<h2>Preview</h2>

<div id="qrcode"></div>

</div>

</div>

</section>

<section class="tool-info">

<div class="container">

<h2>Supported QR Types</h2>

<div class="features">

<div class="feature">
🌐 Website URL
</div>

<div class="feature">
📝 Plain Text
</div>

<div class="feature">
📧 Email
</div>

<div class="feature">
📞 Phone
</div>

<div class="feature">
💬 WhatsApp
</div>

<div class="feature">
📶 WiFi
</div>

</div>

</div>

</section>

<!-- ====== COPY YOUR EXISTING FOOTER HERE ====== -->

<script src="../js/qr-generator.js"></script>

</body>
</html>
