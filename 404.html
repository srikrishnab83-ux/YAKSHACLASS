<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found | VidToolkit Pro</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
padding:20px;
}

.container{
max-width:650px;
}

h1{
font-size:110px;
color:#3b82f6;
margin-bottom:15px;
}

h2{
font-size:34px;
margin-bottom:15px;
}

p{
font-size:18px;
color:#cbd5e1;
line-height:1.6;
margin-bottom:35px;
}

a{
display:inline-block;
padding:15px 35px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
transition:.3s;
}

a:hover{
background:#1d4ed8;
transform:translateY(-3px);
}

</style>

</head>

<body>

<div class="container">

<h1>404</h1>

<h2>Oops! Page Not Found</h2>

<p>
The page you're looking for doesn't exist or may have been moved.
</p>

<a href="index.html">🏠 Back to Home</a>

</div>

</body>

</html>
