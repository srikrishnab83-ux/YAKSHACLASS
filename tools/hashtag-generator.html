<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free Hashtag Generator | VidToolkit Pro</title>

<meta name="description"
content="Generate trending hashtags for Instagram, YouTube, Facebook and TikTok instantly.">

<link rel="stylesheet" href="../css/hashtag-generator.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- Copy your existing Header here -->

<section class="tool-hero">

<div class="container">

<h1>Hashtag Generator</h1>

<p>Create trending hashtags for Instagram, YouTube, Facebook & TikTok.</p>

</div>

</section>

<section class="tool-section">

<div class="container">

<div class="tool-card">

<div class="form-group">

<label>Platform</label>

<select id="platform">

<option value="instagram">Instagram</option>

<option value="youtube">YouTube</option>

<option value="facebook">Facebook</option>

<option value="tiktok">TikTok</option>

</select>

</div>

<div class="form-group">

<label>Keyword</label>

<input
type="text"
id="keyword"
placeholder="Example: Travel">

</div>

<div class="button-group">

<button id="generateBtn">

Generate Hashtags

</button>

<button id="copyBtn">

Copy

</button>

<button id="clearBtn">

Clear

</button>

</div>

</div>

<div class="preview-card">

<h2>Generated Hashtags</h2>

<textarea
id="result"
rows="12"
readonly
placeholder="Your hashtags will appear here..."></textarea>

</div>

</div>

</section>

<section class="tool-info">

<div class="container">

<h2>Features</h2>

<div class="features">

<div class="feature">Instagram Hashtags</div>

<div class="feature">YouTube Hashtags</div>

<div class="feature">Facebook Hashtags</div>

<div class="feature">TikTok Hashtags</div>

<div class="feature">Copy in One Click</div>

<div class="feature">100% Free</div>

</div>

</div>

</section>

<!-- Copy your existing Footer here -->

<script src="../js/hashtag-generator.js"></script>

</body>
</html>
