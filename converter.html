<header>
    <h1>VidToolkit Pro</h1>
    <a href="index.html">← Home</a>
</header>

<section class="hero">
    <h2>Universal File Converter</h2>
    <p>Convert PDF, Word, Excel, Images and more.</p>
</section>

<div class="converter-container">

    <div class="converter-section">

        <h2>Convert Files</h2>

        <div class="upload-box">

            <label>Convert From</label>

            <select id="fromFormat">
                <option>PDF</option>
                <option>Word</option>
                <option>JPG</option>
                <option>PNG</option>
                <option>Excel</option>
                <option>PowerPoint</option>
                <option>HTML</option>
                <option>Text</option>
            </select>

            <br><br>

            <label>Convert To</label>

            <select id="toFormat">
                <option>Word</option>
            </select>

            <br><br>

            <input type="file" id="fileInput">

            <br><br>

            <button class="convert-btn" id="convertBtn">
                Convert File
            </button>

            <br><br>

            <progress id="progressBar" value="0" max="100" style="width:100%;display:none;"></progress>

            <br><br>

            <a href="#" id="downloadBtn" class="convert-btn" style="display:none;">
                Download File
            </a>

        </div>

    </div>

    <div class="converter-section">

        <h2>Supported Formats</h2>

        <div class="converter-grid">

            <div class="converter-card">
                <h3>PDF</h3>
                <p>PDF → Word, JPG, PNG, Excel, PowerPoint, Text</p>
            </div>

            <div class="converter-card">
                <h3>To PDF</h3>
                <p>Word, JPG, PNG, Excel, PowerPoint, HTML, Text → PDF</p>
            </div>

        </div>

    </div>

</div>

<footer>
    <p>© 2026 VidToolkit Pro</p>
</footer>

<script src="js/converter.js"></script>
